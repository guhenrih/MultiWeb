<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiWeb - Calculadora de IMC</title>
    
    <link rel="stylesheet" href="../styles/style_ferramentas.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="btn-icon">
                <img src="../icones/voltar.svg" alt="seta para voltar" class="btn-icon">
            </a>
            <a href="index.html"><h1 class="logo">MultiWeb</h1></a>
            
            <div class="actions">
                <button type="button" class="btn-icon" id="btn-tema">
                    <img src="../icones/modo_escuro.svg" alt="tema claro ou escuro">
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="ferramenta-container">
            
            <div class="ferramenta-cabecalho">
                <img src="../icones/balanca.svg" alt="ícone de balança" class="icone_combustivel">
                <h2>Calculadora de IMC</h2>
                <p>Descubra seu Índice de Massa Corporal.</p>
            </div>

            <div class="calculadora-box">
                <div class="input-group">
                    <label for="peso">Peso (kg)</label>
                    <input type="number" id="peso" placeholder="Ex: 75.5" step="0.1">
                </div>

                <div class="input-group">
                    <label for="altura">Altura (m)</label>
                    <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">
                </div>

                <button id="btn-calcular" class="btn-principal">Calcular</button>

                <div id="resultado-display" class="resultado-simples">
                    <h3 id="texto-resultado">Insira os valores para calcular</h3>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 MultiWeb - <a href="https://github.com/guhenrih" target="_blank">Gustavo Henrique de Almeida</a>.</p>
    </footer>

    <script src="../javascript/js_imc.js"></script>
    <script src="../javascript/js_tema.js"></script>
</body>
</html>
