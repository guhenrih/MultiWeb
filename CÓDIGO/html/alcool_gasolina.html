<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiWeb - Álcool vs Gasolina</title>
    <link rel="stylesheet" href="../styles/style_ferramentas.css">
</head>
<body>

    <header class="cabecalho-principal">
        <div class="conteudo-cabecalho">
            <a href="index.html" class="botao-icone">
                <img src="../icones/voltar.svg" alt="seta para voltar" class="botao-icone">
            </a>
            <a href="index.html"><h1 class="logomarca">MultiWeb</h1></a>
            
            <div class="acoes">
                <button type="button" class="botao-icone" id="botao-tema">
                    <img src="../icones/modo_escuro.svg" alt="tema claro ou escuro">
                </button>
            </div>
        </div>
    </header>

    <main class="conteudo-principal">
        <div class="container-ferramenta">
            
            <div class="cabecalho-ferramenta">
                <img src="../icones/combustivel.svg" alt="bomba de combustivel" class="icone-ferramenta">
                <h2>Álcool vs Gasolina</h2>
                <p>Cálculo de rendimento baseado na regra dos 70%.</p>
            </div>

            <div class="caixa-calculadora">
                <div class="grupo-input">
                    <label for="preco-alcool">Preço do Álcool (R$)</label>
                    <input type="number" id="preco-alcool" placeholder="Ex: 3.89" step="0.01">
                </div>

                <div class="grupo-input">
                    <label for="preco-gasolina">Preço da Gasolina (R$)</label>
                    <input type="number" id="preco-gasolina" placeholder="Ex: 5.79" step="0.01">
                </div>

                <button id="botao-calcular" class="botao-principal">Calcular</button>

                <div id="area-resultado" class="resultado-simples">
                    <h3 id="texto-resultado">Insira os valores para comparar</h3>
                </div>
            </div>
        </div>
    </main>

    <footer class="rodape-principal">
        <p class="texto-centralizado">&copy; 2026 MultiWeb - <a href="https://github.com/guhenrih" target="_blank">Gustavo Henrique de Almeida</a>.</p>
    </footer>

    <script src="../javascript/js_alcool_gasolina.js"></script>
    <script src="../javascript/js_tema.js"></script>
</body>
</html>
