<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiWeb - Álcool vs Gasolina</title>
    
    <link rel="stylesheet" href="../styles/style_alcool_gasolina.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="btn-icon">
                <img src="../icones/voltar.svg" alt="seta para voltar" class="btn-icon">
            </a>
            <h1 class="logo">MultiWeb</h1>
            
            <div class="actions">
                <button type="button" class="btn-icon">
                    <img src="../icones/modo_escuro.svg" alt="tema claro ou escuro">
                </button>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="ferramenta-container">
            
            <div class="ferramenta-cabecalho">
                <img src="../icones/combustivel.svg" alt="bomba de combustivel" class="icone_combustivel">
                <h2>Álcool vs Gasolina</h2>
                <p>Cálculo de rendimento baseado na regra dos 70%.</p>
            </div>

            <div class="calculadora-box">
                <div class="input-group">
                    <label for="preco-alcool">Preço do Álcool (R$)</label>
                    <input type="number" id="preco-alcool" placeholder="Ex: 3.89" step="0.01">
                </div>

                <div class="input-group">
                    <label for="preco-gasolina">Preço da Gasolina (R$)</label>
                    <input type="number" id="preco-gasolina" placeholder="Ex: 5.79" step="0.01">
                </div>

                <button id="btn-calcular" class="btn-principal">Calcular</button>

                <div id="resultado-display" class="resultado-simples">
                    <h3 id="texto-resultado">Insira os valores para comparar</h3>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 MultiWeb - <a href="https://github.com/guhenrih" target="_blank">Gustavo Henrique de Almeida</a>.</p>
    </footer>

    <script src="../javascript/js_alcool_gasolina.js"></script>
</body>
</html>
